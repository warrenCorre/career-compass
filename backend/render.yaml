services:
  - type: web
    name: careercompass-api
    runtime: python
    rootDir: backend                          # ← THIS IS THE KEY FIX
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production